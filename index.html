<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veseda Enterprise - Authentication Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="auth-wrapper">
    <div class="login-card center-box">
      
      <!-- Premium Identity Branding -->
      <div class="auth-header">
        <h1 class="brand-logo">TOMORROW MAKERS</h1>
        <p class="auth-subtitle">AI-powered Resource Management</p>
      </div>

      <!-- Credential Input Interface -->
      <form onsubmit="event.preventDefault(); login();" class="auth-form">
        
        <div class="input-group">
          <label class="input-label">Enterprise Email</label>
          <input type="email" placeholder="username@enterprise.com" required class="form-input">
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" placeholder="Abc123" required class="form-input">
        </div>

        <!-- System Access Trigger -->
        <button type="submit" class="btn btn-login">Login</button>
      
      </form>

      <!-- High-Class Compliance Footer for Hackathon Judges -->
      <footer class="auth-footer">
        <p>🔒 Secure Gateway • AES-256 Protocol Infrastructure</p>
      </footer>

    </div>
  </div>

  <!-- Gateway Routing Logic -->
  <script>
    function login() {
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
