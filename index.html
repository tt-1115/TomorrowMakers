<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomorrow Makers - Authentication Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

  <div class="auth-wrapper">
    <div class="login-card">
      
      <div class="auth-header">
        <h1 class="brand-logo">TOMORROW MAKERS</h1>
        <p class="auth-subtitle">AI-powered Resource Management</p>
      </div>

      <div id="loginSection">
        <form onsubmit="event.preventDefault(); login();" class="auth-form">
          <div class="input-group">
            <label class="input-label">Email</label>
            <input type="email" id="loginEmail" placeholder="username@yahoo.com" required>
          </div>

          <div class="input-group">
            <label class="input-label">Password</label>
            <input type="password" id="loginPassword" placeholder="Abc123" required>
          </div>

          <button type="submit">Login</button>
        </form>
        <p class="toggle-text">Don't have an account? <a href="#" onclick="toggleAuth(true)">Sign Up</a></p>
      </div>

      <div id="signupSection" style="display: none;">
        <form onsubmit="event.preventDefault(); signup();" class="auth-form">
          <div class="input-group">
            <label class="input-label">Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe" required>
          </div>

          <div class="input-group">
            <label class="input-label">Email Address</label>
            <input type="email" id="signupEmail" placeholder="username@yahoo.com" required>
          </div>

          <div class="input-group">
            <label class="input-label">Create Password</label>
            <input type="password" id="signupPassword" placeholder="••••••••" required>
          </div>

          <button type="submit" style="background: #2ecc71;">Create Account</button>
        </form>
        <p class="toggle-text">Already have an account? <a href="#" onclick="toggleAuth(false)">Login</a></p>
      </div>

      <footer class="auth-footer">
        <p>🔒 Secure Gateway Infrastructure</p>
      </footer>

    </div>
  </div>

  <script>
    // Switches views between Login and Sign Up
    function toggleAuth(showSignup) {
      const loginSec = document.getElementById("loginSection");
      const signupSec = document.getElementById("signupSection");
      
      if (showSignup) {
        loginSec.style.display = "none";
        signupSec.style.display = "block";
      } else {
        loginSec.style.display = "block";
        signupSec.style.display = "none";
      }
    }

    // Handles Registration
    function signup() {
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;

      // Save credentials in browser storage so the login page can recognize them!
      localStorage.setItem("userEmail", email);
      localStorage.setItem("userPassword", password);

      alert("Account created successfully! Logging you into the console...");
      window.location.href = "dashboard.html";
    }

    // Handles Login verification
    function login() {
      const emailInput = document.getElementById("loginEmail").value;
      const passwordInput = document.getElementById("loginPassword").value;

      // Pull the account data we saved during Sign Up
      const savedEmail = localStorage.getItem("userEmail");
      const savedPassword = localStorage.getItem("userPassword");

      // Simple mock check (allows access if fields match signup, or default hackathon bypass strings)
      if ((savedEmail && emailInput === savedEmail && passwordInput === savedPassword) || 
          (emailInput === "admin@yahoo.com" && passwordInput === "admin123")) {
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid credentials! Please try again or create a new account.");
      }
    }
  </script>

</body>
</html>
